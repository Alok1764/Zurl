spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/urlshortener}
    username: ${DB_USER:root}
    password: ${DB_PASS:secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  task:
    execution:
      pool:
        core-size: 4

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-change-in-production-key-must-be-long}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
