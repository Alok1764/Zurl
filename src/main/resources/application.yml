spring:
  application:
    name: url-shortener-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/url_shortener_db}
    username: ${DB_USER:root}
    password: ${DB_PASS:Alok303017}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  task:
    execution:
      pool:
        core-size: 4

jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyThatIsAtLeast32CharsLong123}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
